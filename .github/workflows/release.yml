name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        shell: pwsh
        run: python -m unittest discover -s tests -v

      - name: Read app version
        id: version
        shell: pwsh
        run: |
          $version = @'
          from pathlib import Path
          import re

          content = Path("videogenius_ai/version.py").read_text(encoding="utf-8")
          match = re.search(r'APP_VERSION = "(\d+\.\d+\.\d+)"', content)
          if not match:
              raise SystemExit("APP_VERSION not found")
          print(match.group(1))
          '@ | python -
          "app_version=$version" >> $env:GITHUB_OUTPUT
          "release_tag=V$version" >> $env:GITHUB_OUTPUT

      - name: Verify version changed on push to main
        if: ${{ github.event.before != '0000000000000000000000000000000000000000' }}
        shell: pwsh
        run: |
          git fetch --no-tags origin ${{ github.event.before }} --depth 1
          $previous = git show "${{ github.event.before }}:videogenius_ai/version.py" 2>$null
          if (-not $previous) {
            Write-Host "Previous version file not available; skipping strict version comparison."
            exit 0
          }
          $match = [regex]::Match($previous, 'APP_VERSION = "(\d+\.\d+\.\d+)"')
          if (-not $match.Success) {
            throw "Could not read APP_VERSION from previous commit."
          }
          $previousVersion = $match.Groups[1].Value
          $currentVersion = "${{ steps.version.outputs.app_version }}"
          if ($previousVersion -eq $currentVersion) {
            throw "Version was not bumped. Update videogenius_ai/version.py before pushing to main."
          }

      - name: Build executable
        shell: pwsh
        run: .\build_exe.ps1

      - name: Verify executable output
        shell: pwsh
        run: |
          if (-not (Test-Path .\videogeniusAI.exe)) {
            throw "videogeniusAI.exe was not created."
          }

      - name: Generate release checksum
        shell: pwsh
        run: |
          $checksum = (Get-FileHash .\videogeniusAI.exe -Algorithm SHA256).Hash.ToLowerInvariant()
          "$checksum *videogeniusAI.exe" | Set-Content .\videogeniusAI.exe.sha256 -Encoding ascii

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: videogeniusAI-${{ steps.version.outputs.release_tag }}
          path: |
            videogeniusAI.exe
            videogeniusAI.exe.sha256
            LICENSE
            NOTICE

      - name: Create version tag if missing
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.release_tag }}"
          git fetch --tags
          if (-not (git tag --list $tag)) {
            git tag $tag $env:GITHUB_SHA
            git push origin "refs/tags/$tag"
          }

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          name: VideoGeniusAI ${{ steps.version.outputs.release_tag }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            videogeniusAI.exe
            videogeniusAI.exe.sha256
            LICENSE
            NOTICE
